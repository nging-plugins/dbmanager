{{Extend "db/index"}}
{{Block "title"}}{{"修改数据库"|$.T}}: {{$.Stored.dbName}} - {{Super}}{{/Block}}
{{Block "breadcrumb"}}
{{Super}}
<li><a href="{{call $.Func.dbMgrURL `listTable` $.Stored.dbName}}" data-pjax="#pcont" data-keepjs="true">{{"数据库"|$.T}}: {{$.Stored.dbName}}</a></li>
<li class="active">{{"修改数据库"|$.T}}</li>
{{/Block}}
{{Block "main"}}
<div class="row">
    <div class="col-md-12">
        <div class="block-flat no-padding">
          <div class="header">							
            <h3>{{"修改数据库"|$.T}}: {{$.Stored.dbName}}</h3>
          </div>
          <div class="content">
              <form class="form-horizontal group-border-dashed" method="POST" action="">
              <div class="form-group">
                <label class="col-sm-2 control-label">{{"数据库名称"|$.T}}</label>
                <div class="col-sm-9">
                    <input class="form-control" type="text" value="{{$.Stored.dbName}}" readonly="readonly">
                </div>
              </div>
              <div class="form-group form-submit-group">
				<div class="col-sm-9 col-sm-offset-2">
				  <button type="submit" name="action" value="drop" class="btn btn-danger btn-lg" onclick="return confirm('{{"确定要删除此数据库吗？此操作不可恢复！"|$.T}}');"><i class="fa fa-times"></i> {{"删除数据库"|$.T}}</button>
				  <a class="btn btn-default btn-lg" href="{{call $.Func.dbMgrURL `listDb`}}" data-pjax="#pcont" data-keepjs="true"><i class="fa fa-reply"></i> {{"返回"|$.T}}</a>
				</div>
			</div>
              </form>
          </div><!-- /.content -->
        </div><!-- /.block-flat -->
    </div>
</div>
{{/Block}}
