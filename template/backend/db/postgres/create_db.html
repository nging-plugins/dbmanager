{{Extend "db/index"}}
{{Block "title"}}{{"创建数据库"|$.T}} - {{Super}}{{/Block}}
{{Block "breadcrumb"}}
{{Super}}
<li><a href="{{call $.Func.dbMgrURL `listDb`}}" data-pjax="#pcont" data-keepjs="true">{{"数据库列表"|$.T}}</a></li>
<li class="active">{{"创建数据库"|$.T}}</li>
{{/Block}}
{{Block "main"}}
<div class="row">
  <div class="col-md-12">
    {{Include "db/mysql/results"}}
    <div class="block-flat no-padding">
      <div class="header">
        <h3>{{"创建数据库"|$.T}}</h3>
      </div>
      <div class="content">
        <form class="form-horizontal group-border-dashed" method="POST" action="">
          <div class="form-group">
            <label class="col-sm-2 control-label">{{"数据库名"|$.T}}</label>
            <div class="col-sm-9">
              <input type="text" name="name" class="form-control" required="required" value="{{$.Form `name`}}">
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-2 control-label">{{"所有者"|$.T}}</label>
            <div class="col-sm-9">
              <input type="text" name="owner" class="form-control" value="{{$.Form `owner`}}" placeholder="postgres">
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-2 control-label">{{"编码"|$.T}}</label>
            <div class="col-sm-9">
              <select name="encoding" class="form-control">
                <option value="UTF8"{{if eq ($.Form `encoding`) `UTF8`}} selected{{end}}>UTF8</option>
                <option value="LATIN1"{{if eq ($.Form `encoding`) `LATIN1`}} selected{{end}}>LATIN1</option>
                <option value="SQL_ASCII"{{if eq ($.Form `encoding`) `SQL_ASCII`}} selected{{end}}>SQL_ASCII</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-2 control-label">{{"模板"|$.T}}</label>
            <div class="col-sm-9">
              <input type="text" name="template" class="form-control" value="{{$.Form `template`}}" placeholder="template0">
            </div>
          </div>
          <div class="form-group form-submit-group">
            <div class="col-sm-9 col-sm-offset-2">
              <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-save"></i> {{"创建"|$.T}}</button>
              <a class="btn btn-default btn-lg" href="{{call $.Func.dbMgrURL `listDb`}}" data-pjax="#pcont" data-keepjs="true"><i class="fa fa-reply"></i> {{"返回"|$.T}}</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{/Block}}
